name: Security & Compliance Scans
# SOC 2: CC7.1 (Detects vulnerabilities), CC7.2 (Monitors dependencies), CC6.7 (Prevents secret leakage)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * 1'  # Weekly Monday 2AM UTC

permissions:
  security-events: write
  contents: read
  pull-requests: write

jobs:
  security-scan:
    name: SAST + Dependencies + Secrets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: pip-audit locked dependencies
        run: |
          uv export --format requirements-txt --frozen --all-extras --group dev \
            --no-emit-project \
            | uvx pip-audit -r /dev/stdin --progress-spinner off

      # SAST: CodeQL
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"

      # Dependency + filesystem scan: Trivy
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy SARIF results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy'

      # Secret scanning: Gitleaks
      - name: Run Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security-gate:
    name: Security Gate (PR only)
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.event_name == 'pull_request'
    steps:
      - name: Gate passed
        run: echo "✅ All security scans passed — safe to merge"
        if: needs.security-scan.result == 'success'
      - name: Gate failed
        run: |
          echo "❌ Security scans failed — merge blocked"
          exit 1
        if: needs.security-scan.result != 'success'
