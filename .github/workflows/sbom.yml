name: SBOM
# NIST SSDF PS.2.1 — document provenance of all software components shipped in each release.
# Generates a CycloneDX SBOM from the locked runtime dependency set and attaches it to the GitHub Release.

on:
  push:
    tags:
      - 'v*'
  # Allow ad-hoc generation (e.g. for verification on a non-tag commit).
  # The "Attach SBOM to GitHub Release" step is gated on tag refs, so manual runs only produce the artifact.
  workflow_dispatch:

permissions:
  contents: write  # required for softprops/action-gh-release to upload the SBOM asset

jobs:
  sbom:
    name: Generate CycloneDX SBOM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      # Dev group installs cyclonedx-bom from uv.lock so the tool version is pinned and reproducible.
      - name: Sync dev group (provides pinned cyclonedx-py)
        run: uv sync --frozen --all-extras --group dev

      # Runtime-only export: --no-dev keeps the SBOM scoped to what ships to users.
      # --no-emit-project drops the root project (it appears as the SBOM root component instead).
      - name: Export locked runtime requirements
        run: |
          uv export --frozen --format requirements-txt \
            --no-dev --no-emit-project \
            -o requirements.lock.txt

      # --output-reproducible strips timestamps/UUIDs so reruns are bit-identical (useful for attestations).
      # --mc-type application classifies the root (HotspotTriage) as an application, not a library.
      - name: Generate CycloneDX SBOM
        run: |
          uv run --no-sync cyclonedx-py requirements \
            --of JSON \
            --output-reproducible \
            --mc-type application \
            --pyproject pyproject.toml \
            -o sbom.cdx.json \
            requirements.lock.txt

      - name: Upload SBOM as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json

      - name: Attach SBOM to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: sbom.cdx.json
