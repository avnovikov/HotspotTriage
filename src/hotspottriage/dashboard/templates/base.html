<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HotspotTriage Dashboard</title>
  <style>
    :root {
      --bg: #fcfcfa;
      --fg: #1f2937;
      --panel: #ffffff;
      --muted: #6b7280;
      --accent: #0f766e;
      --border: #d1d5db;
      --error: #b91c1c;
      --warn: #b45309;
      --ok: #047857;
      --heatmap-high: #ea580c;
      --debug: #475569;
      --shadow: rgba(15, 23, 42, 0.08);
    }
    body.dark {
      --bg: #0f172a;
      --fg: #e5e7eb;
      --panel: #111827;
      --muted: #9ca3af;
      --accent: #2dd4bf;
      --border: #374151;
      --error: #f87171;
      --warn: #fbbf24;
      --ok: #34d399;
      --heatmap-high: #fb923c;
      --debug: #cbd5e1;
      --shadow: rgba(0, 0, 0, 0.35);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 5;
      flex-wrap: wrap;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    h1 { font-size: 1rem; margin: 0; letter-spacing: 0.02em; }
    .top-nav {
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }
    .nav-tab {
      text-decoration: none;
      color: var(--muted);
      padding: 0.3rem 0.5rem;
      border-radius: 8px;
      border: 1px solid transparent;
      font-size: 0.82rem;
    }
    .nav-tab:hover { color: var(--fg); border-color: var(--border); }
    .nav-tab.active {
      color: var(--accent);
      border-color: var(--accent);
      background: rgba(15, 118, 110, 0.07);
    }
    body.dark .nav-tab.active { background: rgba(45, 212, 191, 0.1); }
    .toolbar { display: flex; align-items: center; gap: 0.5rem; }
    button {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
      color: var(--fg);
      padding: 0.35rem 0.6rem;
      cursor: pointer;
    }
    button:hover { border-color: var(--accent); }
    .badge {
      border-radius: 999px;
      padding: 0.2rem 0.55rem;
      border: 1px solid var(--border);
      font-size: 0.8rem;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      background: var(--panel);
    }
    .dot { width: 0.5rem; height: 0.5rem; border-radius: 50%; background: var(--ok); }
    .dot.dead { background: var(--error); }
    main {
      padding: 0.8rem;
      max-width: 1100px;
      margin: 0 auto;
    }
    .view-section { display: block; }
    .doc-frame {
      width: 100%;
      min-height: 78vh;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel);
    }
    .section-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.8rem;
    }
    section {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 2px 10px var(--shadow);
      padding: 0.75rem;
      min-height: 150px;
    }
    section h2 {
      margin: 0 0 0.6rem;
      font-size: 0.95rem;
      color: var(--accent);
    }
    .stack { display: grid; gap: 0.4rem; }
    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.8rem;
      white-space: pre-wrap;
      word-break: break-word;
      background: rgba(127, 127, 127, 0.08);
      padding: 0.5rem;
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
    }
    th, td {
      border-bottom: 1px solid var(--border);
      padding: 0.35rem;
      text-align: left;
      vertical-align: top;
    }
    th { color: var(--muted); font-weight: 600; }
    #logs {
      max-height: 320px;
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.5rem;
      background: rgba(127, 127, 127, 0.06);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.78rem;
      line-height: 1.35;
    }
    .log-line { margin: 0 0 0.2rem; white-space: pre-wrap; word-break: break-word; }
    .lvl-error { color: var(--error); }
    .lvl-warning { color: var(--warn); }
    .lvl-info { color: var(--fg); }
    .lvl-debug { color: var(--debug); }
    .muted { color: var(--muted); font-size: 0.78rem; }
    input {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
      color: var(--fg);
      padding: 0.35rem 0.5rem;
      min-width: 140px;
    }
    input::placeholder {
      color: var(--muted);
      opacity: 0.72;
    }
    .field {
      display: grid;
      gap: 0.2rem;
    }
    .field-label {
      font-size: 0.78rem;
      color: var(--muted);
      font-weight: 600;
    }
    .cache-form .wide-input {
      min-width: min(100%, 520px);
      width: 100%;
      max-width: 100%;
    }
    .readonly-repo-display {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.35rem 0.5rem;
      min-height: 2rem;
      word-break: break-word;
      color: var(--muted);
      background: rgba(127, 127, 127, 0.06);
    }
    .status-box {
      margin-top: 0.5rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.45rem;
      font-size: 0.78rem;
      min-height: 2.2rem;
      background: rgba(127, 127, 127, 0.06);
    }
    .progress-wrap {
      margin-top: 0.45rem;
      width: 100%;
      height: 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      overflow: hidden;
      background: rgba(127, 127, 127, 0.12);
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), #14b8a6);
      transition: width 0.25s ease;
    }
    .progress-bar.done { background: linear-gradient(90deg, var(--ok), #22c55e); }
    .progress-bar.err { background: linear-gradient(90deg, var(--error), #ef4444); }
    .wide { grid-column: span 2; }
    .cfg-toolbar { display: flex; flex-wrap: wrap; align-items: center; gap: 0.5rem; margin-bottom: 0.55rem; }
    details.norm-metric-card {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.45rem;
      background: rgba(127, 127, 127, 0.04);
    }
    details.norm-metric-card summary { cursor: pointer; font-weight: 600; color: var(--accent); }
    .norm-svg-wrap { position: relative; margin-top: 0.35rem; }
    .norm-svg-wrap svg { display: block; }
    #view-config .norm-svg-wrap {
      width: 50%;
      max-width: 100%;
      min-width: 200px;
    }
    #view-config .norm-svg-wrap svg[data-role="chart"] {
      width: 100%;
      height: auto;
      display: block;
    }
    .norm-tooltip {
      position: absolute;
      pointer-events: none;
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 0.2rem 0.35rem;
      font-size: 0.72rem;
      border-radius: 4px;
      display: none;
      z-index: 10;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }
    .norm-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      align-items: center;
      margin-top: 0.35rem;
      font-size: 0.78rem;
    }
    .norm-controls input.norm-num-in { min-width: 72px; width: 88px; }
    .dist-placeholder { color: var(--muted); font-size: 0.78rem; padding: 0.25rem 0; }
    .weight-group {
      margin-bottom: 0.55rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.45rem;
      background: rgba(127, 127, 127, 0.03);
    }
    .weight-group h3 { margin: 0 0 0.35rem; font-size: 0.82rem; color: var(--muted); }
    .weight-row {
      display: grid;
      grid-template-columns: 1fr minmax(100px, 140px) 74px;
      gap: 0.35rem;
      align-items: center;
      margin-bottom: 0.28rem;
    }
    .weight-sum-badge {
      font-size: 0.78rem;
      padding: 0.15rem 0.45rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      width: fit-content;
      margin-top: 0.15rem;
    }
    .weight-sum-badge.ok { border-color: var(--ok); color: var(--ok); }
    .weight-sum-badge.bad { border-color: var(--error); color: var(--error); }
    .band-editor {
      margin-top: 0.55rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.45rem;
      background: rgba(127, 127, 127, 0.03);
    }
    .band-editor h3 { margin: 0 0 0.35rem; font-size: 0.82rem; color: var(--muted); }
    .band-row {
      display: grid;
      grid-template-columns: 1fr minmax(160px, 240px) 82px;
      gap: 0.35rem;
      align-items: center;
      margin-bottom: 0.28rem;
    }
    .band-row.low-band {
      grid-template-columns: 1fr;
      color: var(--muted);
      font-size: 0.78rem;
    }
    .band-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      font-size: 0.78rem;
    }
    .band-dot { width: 0.55rem; height: 0.55rem; border-radius: 999px; display: inline-block; }
    .band-dot.low { background: var(--ok); }
    .band-dot.medium { background: var(--warn); }
    .band-dot.high { background: var(--heatmap-high); }
    .band-dot.critical { background: var(--error); }
    .heatmap-controls { display: flex; flex-wrap: wrap; align-items: center; gap: 0.5rem; margin-bottom: 0.55rem; }
    .heatmap-controls label { font-size: 0.78rem; color: var(--muted); display: inline-flex; align-items: center; gap: 0.3rem; }
    .heatmap-controls select { min-width: 140px; }
    .heatmap-list { display: flex; flex-direction: column; gap: 0.45rem; font-size: 0.78rem; }
    .heatmap-item { border-bottom: 1px solid var(--border); padding-bottom: 0.35rem; }
    .heatmap-item:last-child { border-bottom: none; }
    .heatmap-item-head {
      display: flex;
      justify-content: space-between;
      gap: 0.5rem;
      align-items: baseline;
      margin-bottom: 0.2rem;
    }
    #heatmapPanel table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 0.74rem;
    }
    #heatmapPanel th,
    #heatmapPanel td {
      border: 1px solid var(--border);
      padding: 0.22rem 0.38rem;
      vertical-align: middle;
    }
    #heatmapPanel thead th {
      text-align: left;
      background: rgba(127, 127, 127, 0.06);
      font-weight: 600;
      font-size: 0.7rem;
      color: var(--muted);
    }
    .heatmap-file-col,
    .heatmap-method-col {
      width: 180px;
      max-width: 180px;
      min-width: 0;
      box-sizing: border-box;
      overflow: hidden;
      white-space: nowrap;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.74rem;
    }
    .heatmap-file-col .heatmap-file-label {
      display: block;
      white-space: nowrap;
      max-width: 100%;
    }
    .heatmap-method-col .heatmap-method {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 100%;
    }
    .heatmap-metric-th {
      text-align: right;
      font-variant-numeric: tabular-nums;
      font-size: 0.66rem;
      line-height: 1.12;
      max-width: 5.25rem;
      min-width: 2.75rem;
      white-space: normal;
      word-spacing: 0;
      hyphens: manual;
    }
    .heatmap-metric-cell {
      font-variant-numeric: tabular-nums;
      text-align: right;
      color: var(--fg);
    }
    .heatmap-val { font-variant-numeric: tabular-nums; color: var(--muted); flex-shrink: 0; }
    .heatmap-bar-track {
      height: 8px;
      border-radius: 4px;
      background: rgba(127, 127, 127, 0.12);
      overflow: hidden;
    }
    .heatmap-bar-fill {
      height: 100%;
      border-radius: 4px;
      min-width: 2px;
      background: var(--accent);
      opacity: 0.85;
    }
    .heatmap-bar-fill.band-low { background: var(--ok); }
    .heatmap-bar-fill.band-medium { background: var(--warn); }
    .heatmap-bar-fill.band-high { background: var(--heatmap-high); }
    .heatmap-bar-fill.band-critical { background: var(--error); }
    @media (max-width: 860px) {
      .section-grid { grid-template-columns: 1fr; }
      .wide { grid-column: span 1; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <h1>HotspotTriage Dashboard</h1>
      <nav id="topNav" class="top-nav" aria-label="Primary">
        <a id="navOverview" class="nav-tab" href="/dashboard/" data-route="overview">Overview</a>
        <a id="navScores" class="nav-tab" href="/dashboard/scores" data-route="scores">HotspotTriage Scores</a>
        <a id="navHeatmap" class="nav-tab" href="/dashboard/heatmap" data-route="heatmap">Heatmap</a>
        <a id="navConfig" class="nav-tab" href="/dashboard/config" data-route="config">Config</a>
      </nav>
    </div>
    <div class="toolbar">
      <span id="healthBadge" class="badge"><span id="healthDot" class="dot"></span><span id="healthText">Alive</span></span>
      <button id="themeToggle" type="button">Toggle Theme</button>
    </div>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <script src="/dashboard/static/js/shared.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
